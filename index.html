<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mimo Solutions — Digital Transformation & IT Services</title>
  <meta name="description" content="Mimo Solutions — Malaysia's trusted partner for digital transformation, cloud solutions, cybersecurity, and custom IT services." />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="favicon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fff;
    color: #0F1729;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  img { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }
  button { cursor: pointer; font-family: inherit; border: none; background: none; }
  ul { list-style: none; }

  /* ── Tokens ── */
  :root {
    --bg:       #FFFFFF;
    --bg2:      #F7F9FF;
    --bg3:      #EEF2FF;
    --border:   #E2E8F4;
    --border2:  #C9D5E8;
    --txt:      #0F1729;
    --txt2:     #4B5A72;
    --txt3:     #8896AA;
    --blue:     #1D5BE8;
    --blue-dk:  #1449C9;
    --blue-lt:  #EBF0FD;
    --teal:     #0BB9A2;
    --teal-lt:  #E5F8F5;
    --grad:     linear-gradient(135deg,#1D5BE8 0%,#0BB9A2 100%);
    --sh-sm:    0 1px 4px rgba(15,23,41,.06),0 1px 2px rgba(15,23,41,.04);
    --sh:       0 4px 20px rgba(15,23,41,.09),0 2px 6px rgba(15,23,41,.05);
    --sh-lg:    0 16px 56px rgba(15,23,41,.13),0 6px 18px rgba(15,23,41,.07);
    --r:        12px;
    --r-lg:     20px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Typography helpers ── */
  h1,h2,h3,h4 { font-weight: 800; line-height: 1.15; letter-spacing: -.025em; }
  .grad-text {
    background: var(--grad);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .section-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 20px;
    background: var(--blue-lt); color: var(--blue);
    font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    margin-bottom: 14px;
  }
  .section-title { font-size: clamp(26px,4vw,42px); margin-bottom: 14px; }
  .section-sub { font-size: 16px; color: var(--txt2); line-height: 1.75; max-width: 520px; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 26px; border-radius: 10px;
    font-size: 15px; font-weight: 600; transition: all .2s;
  }
  .btn-blue {
    background: var(--blue); color: #fff;
    box-shadow: 0 4px 18px rgba(29,91,232,.28);
  }
  .btn-blue:hover { background: var(--blue-dk); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(29,91,232,.38); }
  .btn-ghost {
    background: transparent; color: var(--txt);
    border: 1.5px solid var(--border2);
  }
  .btn-ghost:hover { background: var(--bg2); border-color: var(--txt3); }
  .btn-white {
    background: #fff; color: var(--blue);
    box-shadow: 0 4px 18px rgba(0,0,0,.15);
  }
  .btn-white:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.22); }

  /* ── Reveal animation ── */
  .reveal { opacity: 0; transform: translateY(22px); transition: opacity .65s, transform .65s; }
  .reveal.v { opacity: 1; transform: none; }

  /* ═══════════════════════════════════════════
     NAV
  ═══════════════════════════════════════════ */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    background: rgba(255,255,255,.88);
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid transparent;
    transition: border-color .3s, box-shadow .3s;
  }
  .nav.solid { border-bottom-color: var(--border); box-shadow: var(--sh-sm); }
  .nav-wrap {
    max-width: 1200px; margin: 0 auto;
    display: flex; align-items: center; height: 66px; padding: 0 24px; gap: 6px;
  }
  /* Brand */
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
  .brand-icon {
    width: 36px; height: 36px; border-radius: 9px;
    background: var(--grad);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 900; font-size: 13px; letter-spacing: -.04em; flex-shrink: 0;
  }
  .brand-text .sub { font-size: 10px; color: var(--txt3); font-weight: 500; letter-spacing: .06em; display: block; }
  /* Links */
  .nav-links { display: flex; gap: 2px; margin-left: auto; }
  .nav-links a {
    padding: 8px 13px; border-radius: 8px;
    font-size: 14px; font-weight: 500; color: var(--txt2);
    transition: color .2s, background .2s;
  }
  .nav-links a:hover { color: var(--txt); background: var(--bg2); }
  .nav-links a.active { color: var(--blue); }
  /* Lang toggle */
  .lang-pill {
    display: flex; align-items: center; gap: 2px;
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px; margin-left: 6px;
  }
  .lang-btn {
    padding: 4px 10px; border-radius: 16px;
    font-size: 12px; font-weight: 700; color: var(--txt3);
    background: transparent; transition: all .2s; cursor: pointer; border: none;
  }
  .lang-btn.on { background: #fff; color: var(--txt); box-shadow: var(--sh-sm); }
  /* CTA */
  .nav-cta {
    margin-left: 10px; padding: 9px 20px; border-radius: 9px;
    background: var(--blue); color: #fff;
    font-size: 14px; font-weight: 600;
    box-shadow: 0 2px 10px rgba(29,91,232,.28);
    transition: all .2s; cursor: pointer;
  }
  .nav-cta:hover { background: var(--blue-dk); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(29,91,232,.38); }
  /* Burger */
  .burger {
    display: none; flex-direction: column; gap: 5px;
    padding: 8px; margin-left: auto; cursor: pointer;
  }
  .burger span { display: block; width: 22px; height: 2px; background: var(--txt); border-radius: 2px; transition: all .3s; }
  /* Mobile menu */
  .mob-menu {
    position: fixed; inset: 66px 0 0 0;
    background: #fff; z-index: 199; padding: 20px 20px 32px;
    display: flex; flex-direction: column; gap: 6px;
    transform: translateX(100%); transition: transform .3s; overflow-y: auto;
  }
  .mob-menu.open { transform: none; }
  .mob-menu a {
    display: block; padding: 13px 16px; border-radius: 10px;
    font-size: 16px; font-weight: 500; color: var(--txt);
    border: 1px solid transparent; transition: all .2s;
  }
  .mob-menu a:hover, .mob-menu a.active { background: var(--bg2); border-color: var(--border); }
  .mob-cta {
    margin-top: 6px; padding: 14px 16px; text-align: center;
    background: var(--blue); color: #fff !important;
    border-radius: 10px; font-weight: 600;
  }
  .mob-lang { margin-top: auto; padding-top: 20px; display: flex; justify-content: center; }

  /* ═══════════════════════════════════════════
     PAGE WRAPPER
  ═══════════════════════════════════════════ */
  .page { padding-top: 66px; min-height: 100vh; }

  /* ═══════════════════════════════════════════
     HOME — HERO
  ═══════════════════════════════════════════ */
  .hero {
    padding: 90px 24px 80px;
    background: linear-gradient(160deg,#F0F5FF 0%,#FAFBFF 55%,#F5FFFD 100%);
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -180px; right: -150px;
    width: 560px; height: 560px; border-radius: 50%;
    background: radial-gradient(circle,rgba(29,91,232,.09) 0%,transparent 70%);
    pointer-events: none;
  }
  .hero::after {
    content: ''; position: absolute; bottom: -80px; left: -80px;
    width: 380px; height: 380px; border-radius: 50%;
    background: radial-gradient(circle,rgba(11,185,162,.07) 0%,transparent 70%);
    pointer-events: none;
  }
  .hero-inner {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
  }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 20px;
    background: #fff; border: 1px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--txt2);
    margin-bottom: 22px; box-shadow: var(--sh-sm);
  }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #10B981; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.7;transform:scale(.85)} }
  .hero h1 {
    font-size: clamp(34px,5vw,58px); line-height: 1.07;
    margin-bottom: 22px;
  }
  .hero-sub { font-size: 17px; color: var(--txt2); line-height: 1.75; margin-bottom: 36px; max-width: 460px; }
  .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }

  /* Hero visual card */
  .hero-card {
    background: #fff; border-radius: var(--r-lg);
    border: 1px solid var(--border); box-shadow: var(--sh-lg);
    padding: 28px; position: relative;
  }
  .hero-card-label {
    font-size: 11px; font-weight: 700; color: var(--txt3);
    letter-spacing: .08em; text-transform: uppercase; margin-bottom: 18px;
  }
  .svc-check-list { display: flex; flex-direction: column; gap: 11px; }
  .svc-check {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; color: var(--txt2);
  }
  .svc-check .ck {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    background: var(--blue-lt); color: var(--blue);
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800;
  }
  .hero-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 20px;
  }
  .hstat {
    background: var(--bg2); border-radius: var(--r);
    padding: 16px; text-align: center;
  }
  .hstat-num { font-size: 26px; font-weight: 900; }
  .hstat-lbl { font-size: 11px; color: var(--txt2); margin-top: 2px; }

  /* ═══════════════════════════════════════════
     HOME — SERVICES PREVIEW
  ═══════════════════════════════════════════ */
  .svc-section { padding: 96px 24px; background: #fff; }
  .svc-inner { max-width: 1200px; margin: 0 auto; }
  .svc-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; }
  .svc-card {
    background: #fff; border-radius: var(--r-lg);
    border: 1px solid var(--border); padding: 30px;
    transition: all .3s; position: relative; overflow: hidden;
  }
  .svc-card::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--grad); opacity: 0; transition: opacity .3s;
  }
  .svc-card:hover { box-shadow: var(--sh-lg); transform: translateY(-4px); border-color: #d0dcff; }
  .svc-card:hover::after { opacity: 1; }
  .svc-ico {
    width: 50px; height: 50px; border-radius: 13px;
    background: var(--blue-lt);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin-bottom: 18px;
  }
  .svc-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 10px; }
  .svc-card p { font-size: 13px; color: var(--txt2); line-height: 1.75; }

  /* ═══════════════════════════════════════════
     HOME — ABOUT TEASER
  ═══════════════════════════════════════════ */
  .about-band { padding: 96px 24px; background: var(--bg2); }
  .about-band-inner {
    max-width: 1200px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr 1fr; gap: 72px; align-items: center;
  }
  .about-list { margin-top: 22px; display: flex; flex-direction: column; gap: 13px; }
  .about-list li { display: flex; align-items: flex-start; gap: 11px; font-size: 15px; color: var(--txt2); }
  .about-list .star { color: var(--blue); font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .metric-card {
    background: #fff; border-radius: var(--r); border: 1px solid var(--border);
    padding: 22px; box-shadow: var(--sh-sm);
  }
  .metric-ico { font-size: 26px; margin-bottom: 10px; }
  .metric-num { font-size: 28px; font-weight: 900; }
  .metric-lbl { font-size: 12px; color: var(--txt2); margin-top: 3px; }

  /* ═══════════════════════════════════════════
     HOME — CTA BANNER
  ═══════════════════════════════════════════ */
  .cta-band { padding: 96px 24px; background: #fff; }
  .cta-box {
    max-width: 880px; margin: 0 auto; text-align: center;
    background: var(--grad); border-radius: 22px;
    padding: 60px 40px; position: relative; overflow: hidden;
  }
  .cta-box::before {
    content: ''; position: absolute; top: -80px; right: -80px;
    width: 260px; height: 260px; border-radius: 50%;
    background: rgba(255,255,255,.12); pointer-events: none;
  }
  .cta-box::after {
    content: ''; position: absolute; bottom: -60px; left: -60px;
    width: 200px; height: 200px; border-radius: 50%;
    background: rgba(255,255,255,.08); pointer-events: none;
  }
  .cta-box h2 { font-size: clamp(22px,3.5vw,38px); color: #fff; margin-bottom: 14px; }
  .cta-box p { font-size: 17px; color: rgba(255,255,255,.82); margin-bottom: 34px; }

  /* ═══════════════════════════════════════════
     PAGE HERO (inner pages)
  ═══════════════════════════════════════════ */
  .pg-hero {
    padding: 72px 24px 60px;
    background: linear-gradient(160deg,#F0F5FF 0%,#FAFBFF 100%);
    text-align: center;
  }
  .pg-hero h1 { font-size: clamp(30px,5vw,50px); margin-bottom: 14px; }
  .pg-hero p { font-size: 17px; color: var(--txt2); max-width: 480px; margin: 0 auto; }

  /* ═══════════════════════════════════════════
     SERVICES PAGE
  ═══════════════════════════════════════════ */
  .sp-grid {
    max-width: 1180px; margin: 0 auto; padding: 72px 24px;
    display: grid; grid-template-columns: repeat(3,1fr); gap: 18px;
  }
  .sp-card {
    background: #fff; border-radius: var(--r-lg);
    border: 1px solid var(--border); padding: 32px;
    transition: all .3s;
  }
  .sp-card:hover { box-shadow: var(--sh-lg); transform: translateY(-4px); }
  .sp-ico { width: 54px; height: 54px; border-radius: 14px; background: var(--blue-lt); display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 18px; }
  .sp-card h3 { font-size: 18px; font-weight: 700; margin-bottom: 11px; }
  .sp-card .desc { font-size: 13px; color: var(--txt2); line-height: 1.78; margin-bottom: 18px; }
  .sp-feats { display: flex; flex-direction: column; gap: 8px; }
  .sp-feat { display: flex; gap: 8px; font-size: 13px; color: var(--txt2); align-items: flex-start; }
  .sp-feat .tick { color: var(--blue); font-weight: 800; flex-shrink: 0; }

  /* ═══════════════════════════════════════════
     PROJECTS PAGE
  ═══════════════════════════════════════════ */
  .proj-grid {
    max-width: 860px; margin: 0 auto; padding: 72px 24px;
    display: grid; grid-template-columns: repeat(2,1fr); gap: 22px;
  }
  .proj-card {
    background: #fff; border-radius: var(--r-lg);
    border: 1px solid var(--border); overflow: hidden;
    box-shadow: var(--sh-sm); transition: all .3s;
  }
  .proj-card:hover { box-shadow: var(--sh-lg); transform: translateY(-4px); }
  .proj-head {
    height: 140px; display: flex; align-items: center; justify-content: center;
    font-weight: 900;
  }
  .proj-body { padding: 24px; }
  .proj-chip {
    display: inline-flex; align-items: center;
    padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 700; letter-spacing: .05em;
    margin-bottom: 10px;
  }
  .proj-card h3 { font-size: 19px; font-weight: 800; margin-bottom: 9px; }
  .proj-card p { font-size: 13px; color: var(--txt2); line-height: 1.75; margin-bottom: 16px; }
  .proj-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 700; transition: gap .2s;
  }
  .proj-link:hover { gap: 10px; }

  /* ═══════════════════════════════════════════
     ABOUT PAGE
  ═══════════════════════════════════════════ */
  .about-page { max-width: 980px; margin: 0 auto; padding: 72px 24px; }
  .about-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; margin-bottom: 72px; }
  .about-cols p { font-size: 15px; color: var(--txt2); line-height: 1.85; margin-bottom: 14px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 22px; }
  .info-box {
    background: var(--bg2); border-radius: var(--r);
    border: 1px solid var(--border); padding: 18px;
  }
  .info-box .lbl { font-size: 10px; font-weight: 700; color: var(--txt3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 5px; }
  .info-box .val { font-size: 14px; font-weight: 700; color: var(--txt); }
  .leader-card {
    background: #fff; border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 30px; display: flex; align-items: flex-start; gap: 22px;
    box-shadow: var(--sh-sm);
  }
  .avatar {
    width: 70px; height: 70px; border-radius: 50%; flex-shrink: 0;
    background: var(--grad);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 900; color: #fff; overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .leader-name { font-size: 19px; font-weight: 800; margin-bottom: 3px; }
  .leader-role { font-size: 13px; color: var(--blue); font-weight: 600; margin-bottom: 10px; }
  .leader-bio { font-size: 14px; color: var(--txt2); line-height: 1.75; margin-bottom: 14px; }
  .li-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 13px; border-radius: 8px;
    border: 1.5px solid var(--border); color: var(--txt2);
    font-size: 13px; font-weight: 600; transition: all .2s;
  }
  .li-link:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }

  /* ═══════════════════════════════════════════
     CONTACT PAGE
  ═══════════════════════════════════════════ */
  .contact-page { max-width: 940px; margin: 0 auto; padding: 72px 24px; }
  .contact-cols { display: grid; grid-template-columns: 1fr 1.6fr; gap: 44px; align-items: start; }
  .contact-info h3 { font-size: 20px; font-weight: 800; margin-bottom: 12px; }
  .contact-info p { font-size: 14px; color: var(--txt2); line-height: 1.78; margin-bottom: 26px; }
  .cinfo-list { display: flex; flex-direction: column; gap: 14px; }
  .cinfo-row { display: flex; gap: 12px; align-items: flex-start; }
  .cinfo-ico {
    width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
    background: var(--blue-lt); color: var(--blue);
    display: flex; align-items: center; justify-content: center; font-size: 17px;
  }
  .cinfo-lbl { font-size: 10px; font-weight: 700; color: var(--txt3); letter-spacing: .07em; text-transform: uppercase; }
  .cinfo-val { font-size: 14px; font-weight: 600; color: var(--txt); margin-top: 2px; }
  .contact-form-box {
    background: #fff; border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 34px; box-shadow: var(--sh);
  }
  .form-group { margin-bottom: 18px; }
  .form-lbl { display: block; font-size: 13px; font-weight: 600; color: var(--txt); margin-bottom: 6px; }
  .form-input, .form-select, .form-ta {
    width: 100%; padding: 11px 13px; border-radius: 9px;
    border: 1.5px solid var(--border); background: #fff;
    font-size: 14px; font-family: inherit; color: var(--txt);
    transition: border-color .2s, box-shadow .2s; outline: none;
  }
  .form-input:focus, .form-select:focus, .form-ta:focus {
    border-color: var(--blue); box-shadow: 0 0 0 3px rgba(29,91,232,.1);
  }
  .form-ta { resize: vertical; min-height: 112px; }
  .form-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-btn {
    width: 100%; padding: 13px; border-radius: 10px;
    background: var(--blue); color: #fff;
    font-size: 15px; font-weight: 700; border: none; cursor: pointer;
    box-shadow: 0 4px 18px rgba(29,91,232,.26); transition: all .2s;
  }
  .form-btn:hover { background: var(--blue-dk); transform: translateY(-1px); }
  .form-btn:disabled { opacity: .65; cursor: not-allowed; transform: none; }
  .form-success { text-align: center; padding: 30px 0; }
  .succ-ico { font-size: 48px; margin-bottom: 12px; }
