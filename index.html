<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mimo Solutions — Digital Transformation &amp; IT Services</title>
  <meta name="description" content="Mimo Solutions helps businesses in Malaysia and Southeast Asia accelerate digital transformation through IT consulting, web development, process automation, and cloud solutions." />
  <meta property="og:title" content="Mimo Solutions — Digital Transformation &amp; IT Services" />
  <meta property="og:description" content="Helping Malaysian businesses accelerate digital transformation through IT consulting, web development, and process automation." />
  <meta property="og:url" content="https://mimos.digital" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Mimo Solutions — Digital Transformation &amp; IT Services" />
  <meta name="twitter:description" content="Helping Malaysian businesses accelerate digital transformation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <style>
    :root {
      --dark:       #080D1A;
      --dark-2:     #0D1427;
      --dark-3:     #131C34;
      --dark-4:     #1E2A45;
      --accent:     #00D4A8;
      --accent-dim: #00A882;
      --accent-gl:  rgba(0,212,168,0.12);
      --white:      #FFFFFF;
      --g1:         #EEF0F6;
      --g2:         #B8BCCE;
      --g3:         #6B7194;
      --g4:         #2E3550;
      --line:       rgba(255,255,255,0.07);
      --line2:      rgba(255,255,255,0.13);
      --max:        1200px;
      --gap:        clamp(20px,5vw,60px);
      --r-md:       8px;
      --r-lg:       14px;
      --r-xl:       22px;
      --display:    clamp(38px,5.2vw,72px);
      --h1:         clamp(30px,3.8vw,52px);
      --h2:         clamp(24px,2.4vw,36px);
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:"Inter",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
      font-size:16px;line-height:1.65;
      color:var(--white);background:var(--dark);
      -webkit-font-smoothing:antialiased;
    }
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:var(--dark-2)}
    ::-webkit-scrollbar-thumb{background:var(--dark-4);border-radius:3px}

    /* NAV */
    .nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      height:68px;padding:0 var(--gap);display:flex;align-items:center;
      border-bottom:1px solid transparent;transition:background .3s,border-color .3s;
    }
    .nav.solid{
      background:rgba(8,13,26,.92);
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border-bottom-color:var(--line);
    }
    .nav-inner{width:100%;max-width:var(--max);margin:0 auto;display:flex;align-items:center;gap:8px}
    .brand{display:flex;align-items:center;gap:10px;background:none;border:none;cursor:pointer;padding:0}
    .brand-mark{
      width:36px;height:36px;background:var(--accent);border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      font-family:"JetBrains Mono",monospace;font-size:15px;font-weight:700;
      color:var(--dark);flex-shrink:0;
    }
    .brand-name{font-size:15px;font-weight:700;color:var(--white);line-height:1;letter-spacing:-.2px}
    .brand-sub{font-size:10px;color:var(--g3);letter-spacing:.05em;margin-top:2px}
    .nav-links{display:flex;align-items:center;gap:2px;margin-left:auto}
    .nav-links button{
      background:none;border:none;cursor:pointer;padding:6px 14px;
      font-size:14px;font-weight:500;color:var(--g2);border-radius:var(--r-md);
      transition:color .2s,background .2s;font-family:inherit;
    }
    .nav-links button:hover{color:var(--white);background:var(--line)}
    .nav-links button.active{color:var(--accent)}
    .nav-cta{
      background:var(--accent);color:var(--dark)!important;border:none;
      padding:8px 20px!important;font-weight:700!important;
      border-radius:var(--r-md)!important;cursor:pointer;font-size:14px;
      transition:background .2s,transform .15s;white-space:nowrap;font-family:inherit;
    }
    .nav-cta:hover{background:var(--accent-dim);transform:translateY(-1px)}
    .burger{
      display:none;flex-direction:column;gap:5px;
      background:none;border:none;cursor:pointer;padding:4px;margin-left:auto;
    }
    .burger span{display:block;width:22px;height:2px;background:var(--white);border-radius:2px;transition:transform .25s,opacity .25s}
    .burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .burger.open span:nth-child(2){opacity:0}
    .burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .mmenu{
      display:none;position:fixed;top:68px;left:0;right:0;z-index:99;
      background:rgba(8,13,26,.97);backdrop-filter:blur(20px);
      border-bottom:1px solid var(--line);padding:16px var(--gap) 24px;
      flex-direction:column;gap:4px;
    }
    .mmenu.open{display:flex}
    .mmenu button{
      background:none;border:none;cursor:pointer;padding:12px 16px;
      font-size:16px;font-weight:500;color:var(--g2);text-align:left;
      border-radius:var(--r-md);transition:color .2s,background .2s;font-family:inherit;
    }
    .mmenu button:hover{color:var(--white);background:var(--line)}
    .mmenu button.active{color:var(--accent)}
    .mmenu-cta{background:var(--accent)!important;color:var(--dark)!important;font-weight:700!important;text-align:center!important;margin-top:8px}
    @media(max-width:860px){.nav-links,.nav-cta{display:none}.burger{display:flex}}

    /* LANG TOGGLE */
    .ltoggle{
      display:flex;align-items:center;gap:2px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
      border-radius:999px;padding:3px;
    }
    .ltoggle button{
      background:none;border:none;cursor:pointer;padding:4px 10px;
      font-size:11px;font-weight:600;border-radius:999px;
      font-family:"JetBrains Mono",monospace;letter-spacing:.04em;
      transition:all .2s;
    }
    .ltoggle button.on{background:var(--accent);color:var(--dark)}
    .ltoggle button.off{color:rgba(255,255,255,.45)}

    /* HERO */
    .hero{
      min-height:100vh;display:flex;align-items:center;
      position:relative;overflow:hidden;padding:100px var(--gap) 80px;
    }
    .hero-bg{
      position:absolute;inset:0;
      background:
        radial-gradient(ellipse 80% 60% at 65% 40%,rgba(0,212,168,.08) 0%,transparent 60%),
        radial-gradient(ellipse 50% 40% at 20% 80%,rgba(79,123,240,.06) 0%,transparent 50%),
        var(--dark);
    }
    .hero-grid{
      position:absolute;inset:0;
      background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
      background-size:60px 60px;
      mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);
    }
    .hero-inner{position:relative;z-index:1;width:100%;max-width:var(--max);margin:0 auto}
    .hero-pill{
      display:inline-flex;align-items:center;gap:8px;margin-bottom:28px;
      padding:6px 14px;border:1px solid rgba(0,212,168,.3);border-radius:999px;
      font-size:12px;font-weight:500;color:var(--accent);letter-spacing:.08em;
      background:var(--accent-gl);
    }
    .pill-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 2s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.7)}}
    .hero h1{font-size:var(--display);font-weight:800;letter-spacing:-2px;line-height:1.06;margin:0 0 24px;max-width:820px}
    .hero h1 .ac{color:var(--accent)}
    .hero-sub{font-size:clamp(16px,1.6vw,19px);color:var(--g2);max-width:560px;line-height:1.72;margin:0 0 40px}
    .ctas{display:flex;gap:14px;flex-wrap:wrap}
    .btn{
      display:inline-flex;align-items:center;gap:8px;cursor:pointer;
      padding:13px 26px;font-size:15px;font-weight:700;border-radius:var(--r-lg);
      border:none;transition:all .2s;font-family:inherit;
    }
    .btn-p{background:var(--accent);color:var(--dark)}
    .btn-p:hover{background:var(--accent-dim);transform:translateY(-2px)}
    .btn-o{background:transparent;color:var(--white);border:1px solid var(--line2)}
    .btn-o:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
    .hero-stats{
      display:flex;gap:48px;margin-top:64px;padding-top:40px;
      border-top:1px solid var(--line);flex-wrap:wrap;
    }
    .stat-n{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
    .stat-l{font-size:12px;color:var(--g3);margin-top:4px}

    /* SECTION */
    .sec{padding:96px var(--gap)}
    .sec-in{max-width:var(--max);margin:0 auto}
    .sec-label{font-size:11px;font-weight:600;letter-spacing:.14em;color:var(--accent);text-transform:uppercase;margin-bottom:12px}
    .sec-title{font-size:var(--h2);font-weight:800;letter-spacing:-.5px;color:var(--white);line-height:1.15;margin:0 0 14px}
    .sec-desc{font-size:17px;color:var(--g2);max-width:520px;line-height:1.7;margin:0 0 52px}

    /* SERVICE CARDS */
    .svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
    .svc-card{
      background:var(--dark-2);border:1px solid var(--line);border-radius:var(--r-xl);padding:28px;
      transition:border-color .25s,transform .25s;
    }
    .svc-card:hover{border-color:rgba(0,212,168,.3);transform:translateY(-4px)}
    .svc-icon{
      width:42px;height:42px;background:var(--accent-gl);border:1px solid rgba(0,212,168,.2);
      border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;
      color:var(--accent);margin-bottom:16px;
    }
    .svc-num{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--g4);margin-bottom:8px}
    .svc-t{font-size:17px;font-weight:700;color:var(--white);margin:0 0 10px}
    .svc-d{font-size:14px;color:var(--g3);line-height:1.65;margin:0}

    /* ABOUT TEASER */
    .dark-sec{background:var(--dark-2)}
    .ab-layout{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
    @media(max-width:860px){.ab-layout{grid-template-columns:1fr;gap:40px}}
    .ab-card{background:var(--dark-3);border:1px solid var(--line);border-radius:var(--r-xl);padding:32px}
    .f-avatar{
      width:68px;height:68px;border-radius:50%;border:2px solid var(--accent);
      background:var(--dark-4);display:flex;align-items:center;justify-content:center;
      font-size:22px;font-weight:700;color:var(--accent);margin-bottom:14px;overflow:hidden;
    }
    .f-avatar img{width:100%;height:100%;object-fit:cover}
    .f-name{font-size:19px;font-weight:700;color:var(--white);margin:0 0 4px}
    .f-role{font-size:13px;color:var(--accent);font-weight:500;margin:0 0 14px}
    .f-bio{font-size:14px;color:var(--g2);line-height:1.7;margin:0 0 18px}
    .f-links{display:flex;gap:10px}
    .badge{
      display:inline-flex;align-items:center;gap:6px;padding:6px 12px;
      background:var(--accent-gl);border:1px solid rgba(0,212,168,.2);
      border-radius:var(--r-md);font-size:12px;color:var(--accent);
      text-decoration:none;transition:background .2s;
    }
    .badge:hover{background:rgba(0,212,168,.2)}
    .ab-bullets{list-style:none;padding:0;margin:0 0 32px}
    .ab-bullets li{
      display:flex;align-items:flex-start;gap:12px;color:var(--g2);font-size:15px;
      padding:10px 0;border-bottom:1px solid var(--line);
    }
    .ab-bullets li:last-child{border-bottom:none}
    .ab-bullets li::before{
      content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);
      flex-shrink:0;margin-top:9px;
    }

    /* CTA BANNER */
    .cta-box{
      background:linear-gradient(135deg,var(--dark-3) 0%,rgba(0,212,168,.06) 100%);
      border:1px solid rgba(0,212,168,.15);border-radius:var(--r-xl);
      padding:56px 48px;text-align:center;
    }
    .cta-box h2{font-size:clamp(26px,3.5vw,42px);font-weight:800;letter-spacing:-.5px;margin:0 0 14px}
    .cta-box p{font-size:17px;color:var(--g2);margin:0 0 34px;max-width:460px;margin-left:auto;margin-right:auto}

    /* PROJECTS */
    .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:24px}
    .proj-card{
      background:var(--dark-2);border:1px solid var(--line);border-radius:var(--r-xl);
      overflow:hidden;transition:border-color .25s,transform .25s;
    }
    .proj-card:hover{border-color:rgba(0,212,168,.3);transform:translateY(-4px)}
    .proj-thumb{
      height:180px;display:flex;align-items:center;justify-content:center;
      font-size:42px;letter-spacing:-2px;font-weight:800;
      background:var(--dark-3);border-bottom:1px solid var(--line);
    }
    .proj-body{padding:28px}
    .proj-tag{
      display:inline-block;padding:3px 10px;background:var(--accent-gl);
      border-radius:999px;font-size:11px;font-weight:600;color:var(--accent);
      letter-spacing:.06em;margin-bottom:14px;
    }
    .proj-title{font-size:20px;font-weight:700;color:var(--white);margin:0 0 10px}
    .proj-desc{font-size:14px;color:var(--g3);line-height:1.65;margin:0 0 20px}
    .proj-url{
      display:inline-flex;align-items:center;gap:6px;font-size:13px;
      color:var(--accent);text-decoration:none;font-weight:500;
      transition:gap .2s;
    }
    .proj-url:hover{gap:10px}

    /* SERVICES FULL PAGE */
    .svc-full-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:22px}
    .svc-full-card{
      background:var(--dark-2);border:1px solid var(--line);border-radius:var(--r-xl);padding:34px;
      transition:border-color .25s;
    }
    .svc-full-card:hover{border-color:rgba(0,212,168,.25)}
    .svc-tag{display:inline-block;padding:3px 10px;background:var(--accent-gl);border-radius:999px;font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.06em;margin-bottom:18px}
    .svc-full-t{font-size:20px;font-weight:700;color:var(--white);margin:0 0 12px}
    .svc-full-d{font-size:15px;color:var(--g2);line-height:1.7;margin:0 0 18px}
    .svc-pts{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
    .svc-pts li{font-size:13px;color:var(--g3);padding-left:16px;position:relative}
    .svc-pts li::before{content:"→";position:absolute;left:0;color:var(--accent)}

    /* ABOUT PAGE */
    .co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-top:48px}
    .co-card{background:var(--dark-2);border:1px solid var(--line);border-radius:var(--r-lg);padding:18px 22px}
    .co-label{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--g3);text-transform:uppercase;margin-bottom:6px}
    .co-val{font-size:15px;font-weight:600;color:var(--white)}

    /* CONTACT */
    .ct-layout{display:grid;grid-template-columns:1fr 1.4fr;gap:60px;align-items:start}
    @media(max-width:860px){.ct-layout{grid-template-columns:1fr;gap:40px}}
    .ct-info h3{font-size:22px;font-weight:700;color:var(--white);margin:0 0 14px}
    .ct-info p{color:var(--g2);line-height:1.7;margin:0 0 30px}
    .ct-items{display:flex;flex-direction:column;gap:14px}
    .ct-item{display:flex;align-items:center;gap:12px;color:var(--g2);font-size:14px}
    .ct-ico{
      width:36px;height:36px;background:var(--dark-3);border:1px solid var(--line);
      border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;
      color:var(--accent);flex-shrink:0;
    }
    .ct-sub{font-size:11px;color:var(--g3);margin-bottom:2px}
    .ct-form{background:var(--dark-2);border:1px solid var(--line);border-radius:var(--r-xl);padding:34px}
    .frow{margin-bottom:18px}
    .frow label{display:block;font-size:13px;font-weight:500;color:var(--g2);margin-bottom:7px}
    .frow input,.frow textarea,.frow select{
      width:100%;background:var(--dark-3);border:1px solid var(--line2);
      border-radius:var(--r-md);padding:12px 15px;font-size:15px;
      color:var(--white);font-family:inherit;outline:none;transition:border-color .2s;
    }
    .frow input:focus,.frow textarea:focus{border-color:var(--accent)}
    .frow textarea{resize:vertical;min-height:120px}
    .frow input::placeholder,.frow textarea::placeholder{color:var(--g4)}
    .frow select option{background:var(--dark-3)}
    .f2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media(max-width:520px){.f2{grid-template-columns:1fr}}
    .fsub{
      width:100%;background:var(--accent);color:var(--dark);border:none;
      padding:13px;font-size:15px;font-weight:700;border-radius:var(--r-md);
      cursor:pointer;transition:background .2s;font-family:inherit;
    }
    .fsub:hover:not(:disabled){background:var(--accent-dim)}
    .fsub:disabled{opacity:.6;cursor:not-allowed}
    .f-ok{text-align:center;padding:40px 20px}
    .f-ok-ico{
      width:54px;height:54px;background:var(--accent-gl);border:1px solid rgba(0,212,168,.3);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      color:var(--accent);margin:0 auto 14px;
    }
    .f-ok h3{font-size:20px;font-weight:700;color:var(--white);margin:0 0 8px}
    .f-ok p{color:var(--g2);font-size:14px;margin:0}

    /* FOOTER */
    .footer{background:var(--dark-2);border-top:1px solid var(--line);padding:48px var(--gap) 30px}
    .footer-in{max-width:var(--max);margin:0 auto}
    .ft-top{display:flex;justify-content:space-between;align-items:flex-start;gap:40px;margin-bottom:40px;flex-wrap:wrap}
    .ft-tagline{font-size:13px;color:var(--g3);margin-top:8px;max-width:240px;line-height:1.6}
    .ft-links{display:flex;gap:56px;flex-wrap:wrap}
    .ft-col h4{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--g3);margin:0 0 14px}
    .ft-col ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:9px}
    .ft-col ul li button,.ft-col ul li a{
      background:none;border:none;cursor:pointer;padding:0;font-size:14px;
      color:rgba(255,255,255,.45);text-decoration:none;transition:color .2s;font-family:inherit;
    }
    .ft-col ul li button:hover,.ft-col ul li a:hover{color:var(--white)}
    .ft-bot{
      border-top:1px solid var(--line);padding-top:22px;
      display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
    }
    .ft-copy{font-size:13px;color:var(--g3)}
    .ft-reg{font-size:12px;color:var(--g4)}

    /* REVEAL */
    .rv{opacity:0;transform:translateY(18px);transition:opacity .5s ease,transform .5s ease}
    .rv.vis{opacity:1;transform:none}
    .pf{animation:pfIn .3s ease}
    @keyframes pfIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useContext, createContext } = React;

/* ─── i18n ─── */
const LangCtx = createContext({ lang:"en", setLang:()=>{} });
function useLang(){ return useContext(LangCtx); }
function T({ en, zh }){ const { lang } = useLang(); return lang==="zh" ? zh : en; }
function tx(lang, en, zh){ return lang==="zh" ? zh : en; }
function LanguageProvider({ children }){
  const [lang, setL] = useState(()=>{ try{ return localStorage.getItem("mimo-lang")||"en"; }catch(e){ return "en"; } });
  const setLang = l => {
    setL(l);
    try{ localStorage.setItem("mimo-lang",l); }catch(e){}
    document.documentElement.setAttribute("data-lang",l);
    document.documentElement.lang = l==="zh" ? "zh-Hans" : "en";
  };
  useEffect(()=>{ document.documentElement.setAttribute("data-lang",lang); },[lang]);
  return <LangCtx.Provider value={{lang,setLang}}>{children}</LangCtx.Provider>;
}
function LangToggle(){
  const {lang,setLang} = useLang();
  return (
    <div className="ltoggle">
      {["en","zh"].map(l=>(
        <button key={l} className={lang===l?"on":"off"} onClick={()=>setLang(l)}>
          {l==="en"?"EN":"中"}
        </button>
      ))}
    </div>
  );
}

/* ─── Reveal hook ─── */
function useReveal(){
  useEffect(()=>{
    const els = document.querySelectorAll(".rv");
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("vis"); obs.unobserve(e.target); } });
    },{threshold:0.1});
    els.forEach(el=>obs.observe(el));
    return ()=>obs.disconnect();
  },[]);
}

/* ─── CONTACT PAGE ─── */
function ContactPage(){
  useReveal();
  const {lang} = useLang();
  const [form,setForm] = useState({name:"",email:"",company:"",service:"",message:""});
  const [status,setStatus] = useState("idle");
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const submit = async e => {
    e.preventDefault();
    setStatus("loading");
    try {
      const res = await fetch("https://api.web3forms.com/submit",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          access_key:"REPLACE_WITH_YOUR_WEB3FORMS_KEY",
          subject:`Inquiry from ${form.name} — ${form.company||"mimos.digital"}`,
          from_name:form.name,
          ...form,
        }),
      });
      const data = await res.json();
      setStatus(data.success?"success":"error");
    } catch { setStatus("error"); }
  };

  return (
    <div className="pf">
      <section className="sec" style={{paddingTop:140}}>
        <div className="sec-in">
          <div className="sec-label rv"><T en="Contact Us" zh="联系我们"/></div>
          <h1 className="sec-title rv" style={{fontSize:"var(--h1)"}}>
            <T en="Let's Talk" zh="一起聊聊"/>
          </h1>
          <div className="ct-layout">
            <div className="ct-info rv">
              <h3><T en="Get in touch" zh="联系我们"/></h3>
              <p><T en="Have a project in mind, or want to explore how digital transformation can benefit your business? We'd love to hear from you." zh="有项目想法，或想探讨数字化转型如何让您的业务受益？欢迎随时联系我们。"/></p>
              <div className="ct-items">
                <div className="ct-item">
                  <div className="ct-ico">{I.mail}</div>
                  <div>
                    <div className="ct-sub"><T en="Email" zh="邮箱"/></div>
                    <a href="mailto:hello@mimos.digital" style={{color:"var(--white)",textDecoration:"none"}}>hello@mimos.digital</a>
                  </div>
                </div>
                <div className="ct-item">
                  <div className="ct-ico">{I.wa}</div>
                  <div>
                    <div className="ct-sub">WhatsApp</div>
                    <a href="https://wa.me/60192815191" style={{color:"var(--white)",textDecoration:"none"}}>+60 19-281 5191</a>
                  </div>
                </div>
                <div className="ct-item">
                  <div className="ct-ico">{I.pin}</div>
                  <div>
                    <div className="ct-sub"><T en="Location" zh="所在地"/></div>
                    <span>Kuala Lumpur, Malaysia</span>
                  </div>
                </div>
              </div>
            </div>
            <div className="ct-form rv">
              {status==="success" ? (
                <div className="f-ok">
                  <div className="f-ok-ico">{I.check}</div>
                  <h3><T en="Message Sent!" zh="消息已发送！"/></h3>
                  <p><T en="Thank you! We'll get back to you within 1-2 business days." zh="感谢您的来信，我们将在 1-2 个工作日内回复。"/></p>
                </div>
              ):(
                <form onSubmit={submit}>
                  <div className="f2">
                    <div className="frow">
                      <label><T en="Full Name *" zh="姓名 *"/></label>
                      <input required value={form.name} onChange={e=>set("name",e.target.value)} placeholder={tx(lang,"Your name","您的姓名")}/>
                    </div>
                    <div className="frow">
                      <label><T en="Email *" zh="邮箱 *"/></label>
                      <input required type="email" value={form.email} onChange={e=>set("email",e.target.value)} placeholder="your@email.com"/>
                    </div>
                  </div>
                  <div className="frow">
                    <label><T en="Company" zh="公司"/></label>
                    <input value={form.company} onChange={e=>set("company",e.target.value)} placeholder={tx(lang,"Your company (optional)","公司名称（选填）")}/>
                  </div>
                  <div className="frow">
                    <label><T en="Service Interested In" zh="感兴趣的服务"/></label>
                    <select value={form.service} onChange={e=>set("service",e.target.value)}>
                      <option value="">{tx(lang,"Select a service...","选择服务...")}</option>
                      <option value="Digital Transformation">{tx(lang,"Digital Transformation Consulting","数字化转型咨询")}</option>
                      <option value="Web Development">{tx(lang,"Web & Mobile Development","网站与移动端开发")}</option>
                      <option value="Cloud Solutions">{tx(lang,"Cloud Solutions","云端解决方案")}</option>
                      <option value="Process Automation">{tx(lang,"Process Automation","流程自动化")}</option>
                      <option value="SME Grant">{tx(lang,"SME Digital Grant","中小企业数字补贴")}</option>
                      <option value="IT Advisory">{tx(lang,"IT Strategy & Security","IT 战略与安全")}</option>
                      <option value="Other">{tx(lang,"Other / Not sure yet","其他 / 待定")}</option>
                    </select>
                  </div>
                  <div className="frow">
                    <label><T en="Message *" zh="留言 *"/></label>
                    <textarea required value={form.message} onChange={e=>set("message",e.target.value)} placeholder={tx(lang,"Tell us about your project or question...","告诉我们您的项目或问题...")}/>
                  </div>
                  <button type="submit" className="fsub" disabled={status==="loading"}>
                    {status==="loading"?tx(lang,"Sending...","发送中…"):tx(lang,"Send Message","发送消息")}
                  </button>
                  {status==="error"&&(
                    <p style={{color:"#ef4444",fontSize:13,marginTop:8,textAlign:"center"}}>
                      <T en="Something went wrong. Please email hello@mimos.digital directly." zh="出错了，请直接发邮件至 hello@mimos.digital"/>
                    </p>
                  )}
                </form>
              )}
            </div>
          </div>
        </div>
      </section>
    </div>
  );
}
